<!DOCTYPE html>
<html>
<head>
    <title>CloudBus🚀☁️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>CloudBus🚀☁️</h1>
        <p>A Bank that's Truly Yours🫶</p>
        <p>Anytime. Anywhere.</p>

        <input type="text" id="username" placeholder="Username (use email)">
        <input type="password" id="password" placeholder="Password">

        <!-- EXTRA SIGNUP FIELDS -->
        <div id="extraFields" style="display:none;">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="phone" placeholder="Phone">
            <input type="number" id="age" placeholder="Age">
            <input type="text" id="gender" placeholder="Gender">
            <input type="text" id="bank" placeholder="Bank Details">
            <input type="number" id="initialBalance" placeholder="Initial Balance">
            <button onclick="createAccount()">Submit Signup</button>
        </div>

        <button onclick="login()">Login</button>
        <button onclick="showSignup()" class="secondary">
            Create Account
        </button>

    </div>
</div>

<script type="module">

// ✅ Firebase imports (ONLY ONCE)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDUgsMnw5W5lya3TOC2EsFxTmmSG2OvMsQ",
  authDomain: "cloudbus-project.firebaseapp.com",
  projectId: "cloudbus-project",
  storageBucket: "cloudbus-project.firebasestorage.app",
  messagingSenderId: "104243607380",
  appId: "1:104243607380:web:44b0d0ef82c97ab5cdfac1"
};

// ✅ Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ SHOW SIGNUP FIELDS
window.showSignup = function () {
    document.getElementById("extraFields").style.display = "block";
};

// ✅ CREATE ACCOUNT
window.createAccount = function () {
    let email = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("Account created successfully!"))
        .catch(err => alert(err.message));
};

// ✅ LOGIN
window.login = function () {
    let email = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            localStorage.setItem("user", email);
            window.location.href = "dashboard.html";
        })
        .catch(err => alert(err.message));
};

</script>

</body>
</html>
