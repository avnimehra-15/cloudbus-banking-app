<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>CloudBus🚀☁️</h1>

        <button onclick="checkBalance()">Check Balance💰</button>
        <button onclick="showSend()">Send Money💸</button>
        <button onclick="viewTransactions()">Transactions📜</button>
        <button onclick="viewProfile()">Profile👤</button>

        <div id="output"></div>

        <div id="sendBox" style="display:none;">
            <input type="text" id="receiver" placeholder="Receiver Name">
            <input type="text" id="bankSend" placeholder="Bank Details">
            <input type="number" id="amount" placeholder="Amount">
            <input type="text" id="purpose" placeholder="Purpose">
            <button onclick="sendMoney()">Send</button>
        </div>

    </div>
</div>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDUgsMnw5W5lya3TOC2EsFxTmmSG2OvMsQ",
    authDomain: "cloudbus-project.firebaseapp.com",
    projectId: "cloudbus-project",
    storageBucket: "cloudbus-project.firebasestorage.app",
    messagingSenderId: "104243607380",
    appId: "1:104243607380:web:44b0d0ef82c97ab5cdfac1"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
</script>
<script>
// GET USER
let user = localStorage.getItem("user");

if (!user) {
    alert("Login first");
    window.location.href = "index.html";
}

// HELPERS
function getUsers() {
    return JSON.parse(localStorage.getItem("users")) || {};
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

function resetView() {
    document.getElementById("sendBox").style.display = "none";
    document.getElementById("output").innerHTML = "";
}

// 💰 CHECK BALANCE
function checkBalance() {
    resetView();
    let users = getUsers();

    document.getElementById("output").innerHTML =
        "₹" + (users[user]?.balance || 0);
}

// 💸 SHOW SEND
function showSend() {
    resetView();
    document.getElementById("sendBox").style.display = "block";
}

// 💸 SEND MONEY
function sendMoney() {
    let users = getUsers();

    let receiver = document.getElementById("receiver").value;
    let amount = Number(document.getElementById("amount").value);
    let purpose = document.getElementById("purpose").value;

    if (!receiver || !amount) {
        alert("Enter details properly");
        return;
    }

    if (amount > users[user].balance) {
        alert("Insufficient balance");
        return;
    }

    users[user].balance -= amount;

    users[user].transactions.push(
        `Sent ₹${amount} to ${receiver} - ${purpose}`
    );

    saveUsers(users);

    alert("Transfer Successful");

    resetView();
}

// 📜 TRANSACTIONS
function viewTransactions() {
    resetView();
    let users = getUsers();

    let transactions = users[user]?.transactions || [];

    document.getElementById("output").innerHTML =
        transactions.length ? transactions.join("<br>") : "No transactions";
}

// 👤 PROFILE
function viewProfile() {
    resetView();
    let users = getUsers();

    let data = users[user];

    document.getElementById("output").innerHTML = `
        Name: ${user}<br>
        Email: ${data.email || "-"}<br>
        Phone: ${data.phone || "-"}<br>
        Age: ${data.age || "-"}<br>
        Gender: ${data.gender || "-"}<br>
        Bank: ${data.bank || "-"}
    `;
}
</script>

</body>
</html>
